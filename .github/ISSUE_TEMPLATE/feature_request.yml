name: Feature request
description: Suggest a focused improvement to Benri
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest change that would solve the problem.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional workarounds or other designs you considered.

  - type: checkboxes
    id: scope
    attributes:
      label: Project fit
      options:
        - label: This request fits Benri's local-first macOS utility scope.
          required: true
