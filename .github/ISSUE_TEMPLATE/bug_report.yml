name: Bug report
description: Report a reproducible problem in Benri
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem. Remove all secrets and private record content before submitting.

  - type: input
    id: version
    attributes:
      label: Benri version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version and Mac model
      placeholder: "macOS 15.5, MacBook Pro (Apple Silicon)"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest sequence that reproduces the problem.
      placeholder: |
        1. Open Benri with ...
        2. Select ...
        3. Press ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or sanitized logs if useful. Never attach vault.qv, vault.key, passwords, tokens, or private records.

  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I removed secrets, keys, and private record content from this report.
          required: true
