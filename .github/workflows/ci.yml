name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Run checks
        run: make test

      - name: Build app bundle
        run: make app

      - name: Verify app bundle
        run: |
          codesign --verify --deep --strict --verbose=2 dist/Benri.app
          file dist/Benri.app/Contents/MacOS/Benri
